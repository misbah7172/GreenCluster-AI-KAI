# -----------------------------------------------------------
# monitor-deployment.yaml
# DaemonSet for the monitoring HTTP service.
#
# Runs one monitor pod on every GPU-equipped node in the
# cluster, collecting GPU power draw, utilization, memory,
# and CPU metrics. Metrics are exposed via HTTP for the
# k8s_runner to scrape.
#
# Using a DaemonSet instead of a Deployment ensures that
# every node with a GPU is being monitored, regardless of
# how many chunk pods are scheduled there.
# -----------------------------------------------------------
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kai-monitor
  labels:
    app: kai
    component: monitor
spec:
  selector:
    matchLabels:
      app: kai
      component: monitor
  template:
    metadata:
      labels:
        app: kai
        component: monitor
    spec:
      containers:
        - name: monitor
          image: kai-monitor:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          env:
            - name: MONITOR_PORT
              value: "9090"
            - name: GPU_INDEX
              value: "0"
            - name: SAMPLE_INTERVAL
              value: "1.0"
            - name: ENABLE_GPU
              value: "true"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "500m"
              memory: "512Mi"
              nvidia.com/gpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
      # Only schedule on nodes with GPUs
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      # Prefer nodes that have the NVIDIA GPU label
      nodeSelector:
        nvidia.com/gpu.present: "true"
